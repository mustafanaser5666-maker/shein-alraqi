<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة متجر الراقي</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- شاشة الإدخال -->
    <main id="calculator-view" class="max-w-md mx-auto w-full px-4 py-10">
        <h2 class="text-2xl font-bold text-center mb-6 text-blue-900">حاسبة متجر الراقي</h2>
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col gap-4">
            <input id="cart-url" type="text" placeholder="الصق رابط السلة هنا" 
                   class="w-full p-4 bg-slate-50 border rounded-xl text-left font-mono text-sm">
            <button onclick="processCart()" class="w-full bg-blue-900 text-white font-bold py-4 rounded-xl shadow-lg">احسب السعر الآن</button>
        </div>
    </main>

    <!-- شاشة التحميل -->
    <main id="loading-view" class="hidden max-w-md mx-auto w-full px-4 py-20 text-center">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-900 mx-auto"></div>
        <p class="mt-4 text-slate-600 font-bold">جاري قراءة السلة من شي إن... قد يستغرق ثواني</p>
    </main>

    <!-- شاشة النتائج -->
    <main id="results-view" class="hidden max-w-md mx-auto w-full px-4 py-6">
        <div class="bg-white p-6 rounded-2xl shadow-sm text-center">
            <h3 class="text-slate-500 text-sm">إجمالي السعر للزبون</h3>
            <h1 id="final-total" class="text-4xl font-black my-4 text-blue-900">0 د.ع</h1>
            <div id="breakdown" class="text-right text-sm text-slate-600 border-t pt-4 space-y-2"></div>
        </div>
        <button onclick="location.reload()" class="w-full mt-4 py-3 text-slate-400 underline text-sm">حساب سلة أخرى</button>
    </main>

    <script>
        const SCRAPER_API_KEY = '5d8ff11fd876a67aa9ddcf97d922dd26'; 

        async function processCart() {
            const cartUrl = document.getElementById('cart-url').value.trim();
            if(!cartUrl) return alert('الرجاء إدخال الرابط!');

            document.getElementById('calculator-view').classList.add('hidden');
            document.getElementById('loading-view').classList.remove('hidden');

            try {
                // طلب الصفحة مع تفعيل التصفح الحقيقي والموبايل
                const targetApiUrl = `https://api.scraperapi.com/?api_key=${SCRAPER_API_KEY}&url=${encodeURIComponent(cartUrl)}&render=true&premium=true&device_type=mobile`;
                
                const response = await fetch(targetApiUrl);
                const htmlText = await response.text();
                
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlText, 'text/html');
                const pageTitle = doc.title || "لا يوجد عنوان";

                // استخراج النصوص بالكامل
                const bodyText = doc.body ? doc.body.innerText : "";
                
                // البحث عن كلمة Total أو Subtotal أو المجموع يليها أي رقم (لجميع العملات)
                const totalMatch = bodyText.match(/(?:Total|Subtotal|المجموع|الإجمالي)[\s\S]{0,100}?(\d+[\.,]\d+)/i);
                
                let totalAmount = 0;

                if (totalMatch && totalMatch[1]) {
                    totalAmount = parseFloat(totalMatch[1].replace(',', '.'));
                } else {
                    // محاولة بديلة: البحث عن كل الأرقام التي تحتوي على كسور (مثل الأسعار) وأخذ أكبر رقم كإجمالي
                    const allPrices = bodyText.match(/\d+[\.,]\d{2}/g);
                    if(allPrices && allPrices.length > 0) {
                        totalAmount = Math.max(...allPrices.map(p => parseFloat(p.replace(',', '.'))));
                    }
                }

                // إذا لم نجد أي سعر، نرفع خطأ يوضح عنوان الصفحة للتشخيص
                if(totalAmount <= 0) {
                    throw new Error(`لم نجد أسعاراً داخل الصفحة. عنوان الصفحة المسترجعة هو: "${pageTitle}". قد يتطلب الرابط تسجيل دخول أو واجه حظراً.`);
                }

                // فرضية ذكية: إذا كان الرقم المستخرج كبيراً جداً (أكبر من 500) فهو بالدينار العراقي أصلاً، وإذا كان صغيراً فهو بالدولار
                let totalUSD = totalAmount;
                if(totalAmount > 500) {
                    // إذا كان بالدينار العراقي (مثلاً السيرفر فتحه من العراق)، نحوله لدولار لكي تسير الحسابات حسب منطقك الثابت
                    totalUSD = totalAmount / 1530;
                }

                // تطبيق المعادلة المالية الخاصة بك
                const iqd = Math.ceil(totalUSD * 1530);
                const commission = Math.ceil(iqd * 0.10);
                const finalTotal = iqd + commission + 5000;

                // عرض النتيجة للزبون
                document.getElementById('final-total').innerText = finalTotal.toLocaleString() + " د.ع";
                document.getElementById('breakdown').innerHTML = `
                    <p>قيمة المنتجات: ${iqd.toLocaleString()} د.ع</p>
                    <p>العمولة (10%): ${commission.toLocaleString()} د.ع</p>
                    <p>التوصيل: 5,000 د.ع</p>
                `;

                document.getElementById('loading-view').classList.add('hidden');
                document.getElementById('results-view').classList.remove('hidden');

            } catch (error) {
                alert("تنبيه النظام: " + error.message);
                location.reload();
            }
        }
    </script>
</body>
</html>
