<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة متجر الراقي</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- شاشة الإدخال -->
    <main id="calculator-view" class="max-w-md mx-auto w-full px-4 py-10">
        <h2 class="text-2xl font-bold text-center mb-6 text-blue-900">حاسبة متجر الراقي</h2>
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col gap-4">
            <div class="text-sm text-slate-600 bg-slate-50 p-3 rounded-xl text-center">
                <p>📋 الصق رابط المنتج أو السلة من شي إن</p>
                <p class="text-xs mt-1">مثال: https://www.shein.com/p-12345678.html</p>
            </div>
            <input id="cart-url" type="text" placeholder="الصق الرابط هنا" 
                   class="w-full p-4 bg-slate-50 border rounded-xl text-left font-mono text-sm">
            <button onclick="processCart()" class="w-full bg-blue-900 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-800 transition">
                احسب السعر الآن
            </button>
        </div>
    </main>

    <!-- شاشة التحميل -->
    <main id="loading-view" class="hidden max-w-md mx-auto w-full px-4 py-20 text-center">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-900 mx-auto"></div>
        <p id="loading-status" class="mt-4 text-slate-600 font-bold">جاري معالجة الرابط...</p>
    </main>

    <!-- شاشة النتائج -->
    <main id="results-view" class="hidden max-w-md mx-auto w-full px-4 py-6">
        <div class="bg-white p-6 rounded-2xl shadow-sm text-center">
            <h3 class="text-slate-500 text-sm">إجمالي السعر للزبون</h3>
            <h1 id="final-total" class="text-4xl font-black my-4 text-blue-900">0 د.ع</h1>
            <div id="breakdown" class="text-right text-sm text-slate-600 border-t pt-4 space-y-2"></div>
            <div id="products-list" class="text-right text-xs text-slate-500 border-t mt-4 pt-4"></div>
        </div>
        <button onclick="location.reload()" class="w-full mt-4 py-3 text-slate-400 underline text-sm hover:text-slate-600">حساب سلة أخرى</button>
    </sch>

    <script>
        // ====== الحل الجديد: استخدام API مفتوحة لجلب الأسعار ======
        
        // 1. دالة لاستخراج معرف المنتج من الرابط
        function extractProductIds(url) {
            const ids = [];
            
            // محاولة استخراج goods_id من الرابط
            const goodsMatches = url.match(/goods_id=(\d+)/g);
            if (goodsMatches) {
                goodsMatches.forEach(match => {
                    const id = match.match(/\d+/)[0];
                    ids.push(id);
                });
            }
            
            // محاولة استخراج من p-XXXXX
            const pMatches = url.match(/\/p-(\d+)/g);
            if (pMatches) {
                pMatches.forEach(match => {
                    const id = match.match(/\d+/)[0];
                    if (!ids.includes(id)) ids.push(id);
                });
            }
            
            // محاولة استخراج أي رقم طويل (8-12 رقم)
            const numberMatches = url.match(/\b(\d{8,12})\b/g);
            if (numberMatches) {
                numberMatches.forEach(id => {
                    if (!ids.includes(id)) ids.push(id);
                });
            }
            
            return ids;
        }

        // 2. دالة لجلب سعر المنتج من متجر شي إن مباشرة (طريقة بديلة)
        async function fetchProductPrice(productId) {
            try {
                // استخدام خدمة Proxy مجانية لتجاوز CORS
                const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://www.shein.com/product/${productId}`)}`;
                
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error('فشل جلب الصفحة');
                
                const html = await response.text();
                
                // استخراج السعر من الكود (البحث عن JSON المخفي)
                const priceMatch = html.match(/"salePrice":(\d+\.?\d*)/);
                if (priceMatch) {
                    return parseFloat(priceMatch[1]);
                }
                
                // محاولة أخرى: البحث عن السعر في النص
                const priceTextMatch = html.match(/\$(\d+\.\d{2})/);
                if (priceTextMatch) {
                    return parseFloat(priceTextMatch[1]);
                }
                
                return null;
            } catch (error) {
                console.error(`خطأ في جلب المنتج ${productId}:`, error);
                return null;
            }
        }

        // 3. دالة رئيسية لمعالجة السلة
        async function processCart() {
            const cartUrl = document.getElementById('cart-url').value.trim();
            
            if (!cartUrl) {
                return alert('الرجاء إدخال الرابط!');
            }

            // إخفاء شاشة الإدخال وإظهار شاشة التحميل
            document.getElementById('calculator-view').classList.add('hidden');
            document.getElementById('loading-view').classList.remove('hidden');
            document.getElementById('loading-status').innerText = 'جاري استخراج معرفات المنتجات...';

            try {
                // استخراج معرفات المنتجات
                const productIds = extractProductIds(cartUrl);
                
                if (productIds.length === 0) {
                    throw new Error('لم نتمكن من العثور على معرفات المنتجات في الرابط');
                }

                document.getElementById('loading-status').innerText = `تم العثور على ${productIds.length} منتج(ة). جاري جلب الأسعار...`;

                // جلب أسعار المنتجات
                let totalUSD = 0;
                const products = [];

                for (const id of productIds) {
                    document.getElementById('loading-status').innerText = `جاري جلب سعر المنتج ${id}...`;
                    
                    // استخدام واجهة برمجة تطبيقات مجانية (بديلة)
                    try {
                        const price = await fetchProductPrice(id);
                        if (price && price > 0) {
                            totalUSD += price;
                            products.push({ id, price });
                        }
                    } catch (error) {
                        console.warn(`فشل جلب المنتج ${id}`, error);
                    }
                }

                if (totalUSD === 0) {
                    throw new Error('لم نتمكن من جلب أسعار المنتجات. قد يكون الرابط غير صحيح.');
                }

                // تطبيق المعادلة المالية
                const iqd = Math.ceil(totalUSD * 1530);
                const commission = Math.ceil(iqd * 0.10);
                const delivery = 5000;
                const finalTotal = iqd + commission + delivery;

                // عرض النتائج
                document.getElementById('final-total').innerText = finalTotal.toLocaleString() + " د.ع";
                
                document.getElementById('breakdown').innerHTML = `
                    <p>💰 قيمة المنتجات (بالدولار): $${totalUSD.toFixed(2)}</p>
                    <p>💰 قيمة المنتجات (بالدينار): ${iqd.toLocaleString()} د.ع</p>
                    <p>📊 العمولة (10%): ${commission.toLocaleString()} د.ع</p>
                    <p>🚚 التوصيل: ${delivery.toLocaleString()} د.ع</p>
                `;

                // عرض تفاصيل المنتجات
                let productsHtml = '<p class="font-bold text-slate-600 mb-2">📦 تفاصيل المنتجات:</p>';
                products.forEach((p, index) => {
                    productsHtml += `<p>${index + 1}. المنتج ${p.id}: $${p.price.toFixed(2)}</p>`;
                });
                document.getElementById('products-list').innerHTML = productsHtml;

                // إظهار النتائج
                document.getElementById('loading-view').classList.add('hidden');
                document.getElementById('results-view').classList.remove('hidden');

            } catch (error) {
                console.error('خطأ:', error);
                alert("❌ تنبيه النظام: " + error.message);
                location.reload();
            }
        }

        // ====== حل بديل يدوي للمستخدم ======
        // إذا لم تعمل الطريقة التلقائية، نعطي المستخدم خيار إدخال السعر يدوياً
        function showManualEntry() {
            const manualDiv = document.createElement('div');
            manualDiv.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50';
            manualDiv.innerHTML = `
                <div class="bg-white rounded-2xl p-6 max-w-md w-full">
                    <h3 class="text-xl font-bold mb-4 text-center">إدخال السعر يدوياً</h3>
                    <p class="text-sm text-slate-600 mb-4">لم نتمكن من جلب السعر تلقائياً. الرجاء إدخال السعر بالدولار:</p>
                    <input id="manual-price" type="number" step="0.01" placeholder="مثال: 25.99" 
                           class="w-full p-3 border rounded-xl mb-4">
                    <button onclick="calculateManualPrice()" 
                            class="w-full bg-blue-900 text-white font-bold py-3 rounded-xl">
                        احسب السعر
                    </button>
                    <button onclick="this.parentElement.parentElement.remove()" 
                            class="w-full mt-2 text-slate-400 text-sm underline">
                        إلغاء
                    </button>
                </div>
            `;
            document.body.appendChild(manualDiv);
        }

        function calculateManualPrice() {
            const priceInput = document.getElementById('manual-price');
            const price = parseFloat(priceInput.value);
            
            if (!price || price <= 0) {
                return alert('الرجاء إدخال سعر صحيح');
            }

            const iqd = Math.ceil(price * 1530);
            const commission = Math.ceil(iqd * 0.10);
            const delivery = 5000;
            const finalTotal = iqd + commission + delivery;

            // إغلاق النافذة المنبثقة
            document.querySelector('.fixed.inset-0').remove();

            // عرض النتائج
            document.getElementById('final-total').innerText = finalTotal.toLocaleString() + " د.ع";
            document.getElementById('breakdown').innerHTML = `
                <p>💰 قيمة المنتجات (بالدولار): $${price.toFixed(2)}</p>
                <p>💰 قيمة المنتجات (بالدينار): ${iqd.toLocaleString()} د.ع</p>
                <p>📊 العمولة (10%): ${commission.toLocaleString()} د.ع</p>
                <p>🚚 التوصيل: ${delivery.toLocaleString()} د.ع</p>
            `;
            document.getElementById('products-list').innerHTML = '<p class="text-slate-400">تم الإدخال يدوياً</p>';

            document.getElementById('loading-view').classList.add('hidden');
            document.getElementById('results-view').classList.remove('hidden');
        }

        // إضافة زر للإدخال اليدوي عند الفشل
        window.addEventListener('error', function(e) {
            if (e.message.includes('فشل')) {
                showManualEntry();
            }
        });
    </script>
</body>
</html>
