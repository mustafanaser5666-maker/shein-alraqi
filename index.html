<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة متجر الراقي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen">

    <main id="calculator-view" class="max-w-md mx-auto w-full px-4 py-10">
        <h2 class="text-2xl font-bold text-center mb-6">احسب سعر سلتك</h2>
        
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col gap-4">
            <!-- الرابط -->
            <input id="cart-url" type="text" placeholder="الصق رابط السلة هنا (اختياري)" 
                   class="w-full p-4 bg-slate-50 border rounded-xl text-left font-mono text-sm">
            
            <!-- إدخال يدوي -->
            <div class="text-center text-xs text-slate-400">أو إذا فشل الرابط، أدخل السعر بالدولار هنا:</div>
            <input id="manual-price" type="number" placeholder="أدخل إجمالي السعر بالدولار ($)" 
                   class="w-full p-4 bg-amber-50 border border-amber-200 rounded-xl text-center font-bold text-lg">
            
            <button onclick="calculate()" class="w-full bg-blue-900 text-white font-bold py-4 rounded-xl shadow-lg">احسب التكلفة</button>
        </div>
    </main>

    <!-- شاشة النتائج -->
    <main id="results-view" class="hidden max-w-md mx-auto w-full px-4 py-6">
        <div class="bg-white p-6 rounded-2xl shadow-sm text-center">
            <h3 class="text-slate-500 text-sm">إجمالي السعر للزبون</h3>
            <h1 id="final-total" class="text-4xl font-black my-4 text-blue-900">0 د.ع</h1>
            <div id="breakdown" class="text-right text-sm text-slate-600 border-t pt-4 space-y-2"></div>
        </div>
        <button onclick="location.reload()" class="w-full mt-4 py-3 text-slate-400 underline text-sm">حساب سلة أخرى</button>
    </main>

    <script>
        const EXCHANGE_RATE = 1530; 
        const COMMISSION = 0.10; 
        const INTERNAL_DELIVERY = 5000;

        async function calculate() {
            let totalUSD = 0;
            const manualPrice = document.getElementById('manual-price').value;
            const cartUrl = document.getElementById('cart-url').value;

            // 1. الأولوية للإدخال اليدوي
            if (manualPrice && manualPrice > 0) {
                totalUSD = parseFloat(manualPrice);
                processFinal(totalUSD, "إدخال يدوي");
            } 
            // 2. إذا لا يوجد يدوي، حاول السحب الآلي
            else if (cartUrl) {
                alert("جاري محاولة سحب السعر.. إذا ظهر خطأ، يرجى كتابة السعر يدوياً في الخانة الصفراء");
                // هنا منطق السحب السابق (اختصاراً)
                // إذا فشل السحب، أظهر تنبيه للمستخدم
                alert("تعذر سحب السعر تلقائياً بسبب حماية موقع شي إن. يرجى استخدام الخانة الصفراء لإدخال السعر يدوياً.");
            } else {
                alert("يرجى إدخال الرابط أو السعر يدوياً!");
            }
        }

        function processFinal(usd, type) {
            const iqdProducts = Math.ceil(usd * EXCHANGE_RATE);
            const commissionCost = Math.ceil(iqdProducts * COMMISSION);
            const total = iqdProducts + commissionCost + INTERNAL_DELIVERY;

            document.getElementById('calculator-view').classList.add('hidden');
            document.getElementById('results-view').classList.remove('hidden');
            
            document.getElementById('final-total').innerText = total.toLocaleString() + " د.ع";
            document.getElementById('breakdown').innerHTML = `
                <p>قيمة المنتجات: ${iqdProducts.toLocaleString()} د.ع</p>
                <p>العمولة (10%): ${commissionCost.toLocaleString()} د.ع</p>
                <p>التوصيل: ${INTERNAL_DELIVERY.toLocaleString()} د.ع</p>
            `;
        }
    </script>
</body>
</html>
