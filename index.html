<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة متجر الراقي</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- شاشة الإدخال -->
    <main id="calculator-view" class="max-w-md mx-auto w-full px-4 py-10">
        <h2 class="text-2xl font-bold text-center mb-6 text-blue-900">حاسبة متجر الراقي</h2>
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col gap-4">
            <input id="cart-url" type="text" placeholder="الصق رابط السلة هنا" 
                   class="w-full p-4 bg-slate-50 border rounded-xl text-left font-mono text-sm">
            <button onclick="processCart()" class="w-full bg-blue-900 text-white font-bold py-4 rounded-xl shadow-lg">احسب السعر الآن</button>
            <p class="text-xs text-slate-400 text-center">يدعم روابط السلة أو المنتجات الفردية</p>
        </div>
    </main>

    <!-- شاشة التحميل -->
    <main id="loading-view" class="hidden max-w-md mx-auto w-full px-4 py-20 text-center">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-900 mx-auto"></div>
        <p id="loading-status" class="mt-4 text-slate-600 font-bold">جاري قراءة السلة من شي إن...</p>
    </main>

    <!-- شاشة النتائج -->
    <main id="results-view" class="hidden max-w-md mx-auto w-full px-4 py-6">
        <div class="bg-white p-6 rounded-2xl shadow-sm text-center">
            <h3 class="text-slate-500 text-sm">إجمالي السعر للزبون</h3>
            <h1 id="final-total" class="text-4xl font-black my-4 text-blue-900">0 د.ع</h1>
            <div id="breakdown" class="text-right text-sm text-slate-600 border-t pt-4 space-y-2"></div>
            <div id="product-details" class="text-right text-xs text-slate-400 border-t mt-4 pt-4"></div>
        </div>
        <button onclick="location.reload()" class="w-full mt-4 py-3 text-slate-400 underline text-sm">حساب سلة أخرى</button>
    </main>

    <script>
        // مفتاح API الخاص بـ Shein API على RapidAPI
        const RAPIDAPI_KEY = 'YOUR_RAPIDAPI_KEY_HERE'; // ضع مفتاحك هنا
        
        // دالة لجلب بيانات المنتج الفردي
        async function fetchProductDetails(productId) {
            const url = `https://shein-scraper-api.p.rapidapi.com/shein/product/details?goods_id=${productId}&currency=usd&country=us&language=en`;
            
            const response = await fetch(url, {
                method: 'GET',
                headers: {
                    'X-RapidAPI-Key': RAPIDAPI_KEY,
                    'X-RapidAPI-Host': 'shein-scraper-api.p.rapidapi.com'
                }
            });

            if (!response.ok) {
                throw new Error(`فشل جلب بيانات المنتج (حالة ${response.status})`);
            }

            const data = await response.json();
            return data;
        }

        // دالة لاستخراج معرف المنتج من الرابط
        function extractProductId(url) {
            // محاولة استخراج goods_id من الرابط
            const goodsIdMatch = url.match(/goods_id=(\d+)/);
            if (goodsIdMatch) {
                return goodsIdMatch[1];
            }
            
            // محاولة استخراج من الرابط المباشر مثل: /p-12345678/
            const pMatch = url.match(/\/p-(\d+)/);
            if (pMatch) {
                return pMatch[1];
            }

            // محاولة استخراج أي رقم في الرابط
            const numberMatch = url.match(/(\d{8,})/);
            if (numberMatch) {
                return numberMatch[1];
            }

            return null;
        }

        // دالة معالجة السلة
        async function processCart() {
            const cartUrl = document.getElementById('cart-url').value.trim();
            
            if(!cartUrl) {
                return alert('الرجاء إدخال الرابط!');
            }

            document.getElementById('calculator-view').classList.add('hidden');
            document.getElementById('loading-view').classList.remove('hidden');
            document.getElementById('loading-status').innerText = 'جاري تحليل الرابط...';

            try {
                // محاولة استخراج معرف السلة
                const cartIdMatch = cartUrl.match(/cart_id=(\d+)/);
                
                let totalAmountUSD = 0;
                let productDetails = [];

                if (cartIdMatch) {
                    // إذا كان الرابط يحتوي على معرف سلة
                    const cartId = cartIdMatch[1];
                    document.getElementById('loading-status').innerText = `جاري جلب بيانات السلة (ID: ${cartId})...`;
                    
                    try {
                        // محاولة جلب بيانات السلة من واجهة مختلفة
                        const cartResponse = await fetch(`https://shein-cart-api.p.rapidapi.com/cart?cart_id=${cartId}`, {
                            method: 'GET',
                            headers: {
                                'X-RapidAPI-Key': RAPIDAPI_KEY,
                                'X-RapidAPI-Host': 'shein-cart-api.p.rapidapi.com'
                            }
                        });

                        if (cartResponse.ok) {
                            const cartData = await cartResponse.json();
                            if (cartData && cartData.data && cartData.data.totalAmount) {
                                totalAmountUSD = parseFloat(cartData.data.totalAmount);
                                productDetails = cartData.data.products || [];
                            }
                        }
                    } catch (error) {
                        console.warn('فشل جلب بيانات السلة، نحاول البديل...', error);
                    }
                }

                // إذا لم نجد السلة أو فشل جلبها، نحاول التعامل مع رابط منتج فردي
                if (totalAmountUSD === 0) {
                    const productId = extractProductId(cartUrl);
                    
                    if (productId) {
                        document.getElementById('loading-status').innerText = `جاري جلب بيانات المنتج (ID: ${productId})...`;
                        
                        const productData = await fetchProductDetails(productId);
                        
                        if (productData && productData.data && productData.data.salePrice) {
                            totalAmountUSD = parseFloat(productData.data.salePrice);
                            productDetails = [{
                                name: productData.data.goodsName || 'منتج',
                                price: totalAmountUSD
                            }];
                        } else {
                            throw new Error('لم نتمكن من العثور على سعر المنتج');
                        }
                    } else {
                        throw new Error('لم نتمكن من استخراج معرف المنتج أو السلة من الرابط');
                    }
                }

                // إذا كان السعر 0 أو أقل، نرفع خطأ
                if (totalAmountUSD <= 0) {
                    throw new Error('السلة فارغة أو السعر غير متوفر');
                }

                // تطبيق المعادلة المالية
                const iqd = Math.ceil(totalAmountUSD * 1530);
                const commission = Math.ceil(iqd * 0.10);
                const finalTotal = iqd + commission + 5000;

                // عرض النتائج
                document.getElementById('final-total').innerText = finalTotal.toLocaleString() + " د.ع";
                
                let productsHtml = '';
                if (productDetails.length > 0) {
                    productsHtml = productDetails.map(p => 
                        `<p>• ${p.name || 'منتج'}: $${parseFloat(p.price || 0).toFixed(2)}</p>`
                    ).join('');
                }

                document.getElementById('breakdown').innerHTML = `
                    <p>قيمة المنتجات (بالدولار): $${totalAmountUSD.toFixed(2)}</p>
                    <p>قيمة المنتجات (بالدينار): ${iqd.toLocaleString()} د.ع</p>
                    <p>العمولة (10%): ${commission.toLocaleString()} د.ع</p>
                    <p>التوصيل: 5,000 د.ع</p>
                `;

                document.getElementById('product-details').innerHTML = productsHtml ? 
                    `<p class="font-bold mb-2">تفاصيل المنتجات:</p>${productsHtml}` : '';

                document.getElementById('loading-view').classList.add('hidden');
                document.getElementById('results-view').classList.remove('hidden');

            } catch (error) {
                console.error('خطأ:', error);
                alert("تنبيه النظام: " + error.message);
                location.reload();
            }
        }
    </script>
</body>
</html>
