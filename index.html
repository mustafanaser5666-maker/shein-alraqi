<script>
    const SCRAPER_API_KEY = '5d8ff11fd876a67aa9ddcf97d922dd26'; 

    async function processCart() {
        const cartUrl = document.getElementById('cart-url').value.trim();
        if(!cartUrl) return alert('الرجاء إدخال الرابط أولاً!');

        // تغيير الواجهة
        document.getElementById('calculator-view').classList.add('hidden');
        document.getElementById('loading-view').classList.remove('hidden');

        // إضافة &premium=true لكسر حماية شي إن
        // إضافة &country_code=us لجعل الطلب يبدو وكأنه من أمريكا
        const targetApiUrl = `https://api.scraperapi.com/?api_key=${SCRAPER_API_KEY}&url=${encodeURIComponent(cartUrl)}&render=true&premium=true&country_code=us`;

        try {
            const response = await fetch(targetApiUrl);
            const htmlText = await response.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlText, 'text/html');

            // بحث شامل عن الأسعار في كامل الصفحة
            // نقوم بالبحث عن أي نص يحتوي علامة $ وأرقام
            const bodyText = doc.body.innerText;
            const priceMatches = bodyText.match(/\$\s?\d+\.?\d*/g); 
            
            let totalUSD = 0;
            if(priceMatches && priceMatches.length > 0) {
                // نأخذ المبالغ (نستثني أي أرقام صغيرة جداً قد تكون غير منطقية)
                priceMatches.forEach(p => {
                    const val = parseFloat(p.replace(/[^0-9.]/g, ''));
                    if(val > 5) totalUSD += val; // فرضية أن سعر أي قطعة لا يقل عن 5 دولار لتجنب أرقام الخصم
                });
            }

            if(totalUSD === 0) {
                throw new Error("لم نجد أسعاراً في الرابط. قد تكون السلة خاصة أو الرابط يتطلب تسجيل دخول.");
            }

            // الحسابات
            const EXCHANGE_RATE = 1530;
            const iqd = Math.ceil(totalUSD * EXCHANGE_RATE);
            const commission = Math.ceil(iqd * 0.10);
            const finalTotal = iqd + commission + 5000;

            // إظهار النتيجة (نفس كودك السابق)
            document.getElementById('final-total').innerText = finalTotal.toLocaleString() + " د.ع";
            document.getElementById('loading-view').classList.add('hidden');
            document.getElementById('results-view').classList.remove('hidden');

        } catch (error) {
            alert("خطأ: " + error.message);
            location.reload();
        }
    }
</script>
