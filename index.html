<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة متجر الراقي</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- شاشة الإدخال -->
    <main id="calculator-view" class="max-w-md mx-auto w-full px-4 py-10">
        <h2 class="text-2xl font-bold text-center mb-6 text-blue-900">حاسبة متجر الراقي</h2>
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col gap-4">
            <input id="cart-url" type="text" placeholder="الصق رابط السلة هنا (مثال: https://www.shein.com/.....)" 
                   class="w-full p-4 bg-slate-50 border rounded-xl text-left font-mono text-sm">
            <button onclick="processCart()" class="w-full bg-blue-900 text-white font-bold py-4 rounded-xl shadow-lg">احسب السعر الآن</button>
        </div>
    </main>

    <!-- شاشة التحميل -->
    <main id="loading-view" class="hidden max-w-md mx-auto w-full px-4 py-20 text-center">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-900 mx-auto"></div>
        <p class="mt-4 text-slate-600 font-bold">جاري قراءة السلة من شي إن... قد يستغرق ثواني</p>
    </main>

    <!-- شاشة النتائج -->
    <main id="results-view" class="hidden max-w-md mx-auto w-full px-4 py-6">
        <div class="bg-white p-6 rounded-2xl shadow-sm text-center">
            <h3 class="text-slate-500 text-sm">إجمالي السعر للزبون</h3>
            <h1 id="final-total" class="text-4xl font-black my-4 text-blue-900">0 د.ع</h1>
            <div id="breakdown" class="text-right text-sm text-slate-600 border-t pt-4 space-y-2"></div>
        </div>
        <button onclick="location.reload()" class="w-full mt-4 py-3 text-slate-400 underline text-sm">حساب سلة أخرى</button>
    </main>

    <script>
        // مفتاح API الخاص بـ Shein Cart API على منصة RapidAPI
        // قم بالتسجيل في RapidAPI واشترك في خدمة Shein Cart API للحصول على هذا المفتاح
        const RAPIDAPI_KEY = 'YOUR_RAPIDAPI_KEY_HERE'; // ضع مفتاحك هنا
        
        async function processCart() {
            const cartUrl = document.getElementById('cart-url').value.trim();
            
            // التحقق من صحة الرابط
            if(!cartUrl) return alert('الرجاء إدخال الرابط!');
            if(!cartUrl.includes('shein.com')) return alert('الرجاء إدخال رابط صحيح من متجر شي إن!');

            document.getElementById('calculator-view').classList.add('hidden');
            document.getElementById('loading-view').classList.remove('hidden');

            try {
                // 1. استخراج معرف السلة (Cart ID) من الرابط
                // مثال: https://www.shein.com/ShoppingCart?cart_id=12345678
                const cartIdMatch = cartUrl.match(/cart_id=(\d+)/);
                if (!cartIdMatch) {
                    throw new Error('لم نتمكن من العثور على معرف السلة في الرابط. تأكد من نسخ الرابط بالكامل.');
                }
                const cartId = cartIdMatch[1];

                // 2. إرسال الطلب إلى واجهة برمجة تطبيقات شي إن للحصول على بيانات السلة
                const response = await fetch(`https://shein-cart-api.p.rapidapi.com/cart?cart_id=${cartId}`, {
                    method: 'GET',
                    headers: {
                        'X-RapidAPI-Key': RAPIDAPI_KEY,
                        'X-RapidAPI-Host': 'shein-cart-api.p.rapidapi.com'
                    }
                });

                if (!response.ok) {
                    throw new Error(`فشل جلب البيانات (حالة ${response.status}). تأكد من صحة المفتاح واشتراكك في الخدمة.`);
                }

                const data = await response.json();

                // 3. استخراج المبلغ الإجمالي من البيانات المسترجعة
                // يجب تعديل هذا الجزء حسب هيكل البيانات الذي ترجعه الخدمة
                let totalAmountUSD = 0;
                if (data && data.data && data.data.totalAmount) {
                    totalAmountUSD = parseFloat(data.data.totalAmount);
                } else {
                    // محاولة بديلة: جمع أسعار المنتجات
                    if (data && data.data && data.data.products) {
                        totalAmountUSD = data.data.products.reduce((sum, product) => sum + parseFloat(product.price || 0), 0);
                    }
                }

                if (totalAmountUSD <= 0) {
                    throw new Error('لم نتمكن من حساب المبلغ الإجمالي. قد تكون السلة فارغة أو البيانات غير متوفرة.');
                }

                // 4. تطبيق المعادلة المالية الخاصة بك
                const iqd = Math.ceil(totalAmountUSD * 1530);
                const commission = Math.ceil(iqd * 0.10);
                const finalTotal = iqd + commission + 5000;

                // 5. عرض النتيجة للزبون
                document.getElementById('final-total').innerText = finalTotal.toLocaleString() + " د.ع";
                document.getElementById('breakdown').innerHTML = `
                    <p>قيمة المنتجات (بالدولار): $${totalAmountUSD.toFixed(2)}</p>
                    <p>قيمة المنتجات (بالدينار): ${iqd.toLocaleString()} د.ع</p>
                    <p>العمولة (10%): ${commission.toLocaleString()} د.ع</p>
                    <p>التوصيل: 5,000 د.ع</p>
                `;

                document.getElementById('loading-view').classList.add('hidden');
                document.getElementById('results-view').classList.remove('hidden');

            } catch (error) {
                alert("تنبيه النظام: " + error.message);
                location.reload();
            }
        }
    </script>
</body>
</html>
